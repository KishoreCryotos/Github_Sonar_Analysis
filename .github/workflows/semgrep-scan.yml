name: Semgrep Scan

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  security-events: write   # required for SARIF upload

jobs:
  semgrep:
    name: Semgrep Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required for baseline comparison

      # 🔹 Install Semgrep + jq
      - name: Install Dependencies
        run: |
          pip install semgrep
          sudo apt-get update && sudo apt-get install -y jq

      # 🔹 Run Semgrep (JSON + SARIF with proper rules + baseline)
      - name: Run Semgrep Scan
        run: |
          # JSON report (for summary + counting)
          semgrep scan \
            --config=p/security-audit \
            --baseline-ref=${{ github.event.pull_request.base.sha }} \
            --json > semgrep.json

          # SARIF report (for PR annotations + Security tab)
          semgrep scan \
            --config=p/security-audit \
            --baseline-ref=${{ github.event.pull_request.base.sha }} \
            --sarif > semgrep.sarif

      # 🔹 Convert JSON → Markdown (for Checks tab)
      - name: Generate Markdown Report
        run: |
          echo "## 🚨 Semgrep Findings" > semgrep.md

          if [ -s semgrep.json ]; then
            jq -r '
              .results[] |
              "### 🚨 Issue Detected\n" +
              "- **File:** \(.path)\n" +
              "- **Rule:** \(.check_id)\n" +
              "- **Line:** \(.start.line)\n" +
              "- **Severity:** \(.extra.severity)\n"
            ' semgrep.json >> semgrep.md || true
          fi

      # 🔹 Upload SARIF → PR annotations + Security tab alerts
      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

      # 🔹 Show report in Checks tab
      - name: Show Report in PR Summary
        run: |
          if [ -s semgrep.md ]; then
            cat semgrep.md >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No Semgrep findings in PR commits" >> $GITHUB_STEP_SUMMARY
          fi

      # 🔹 Count findings
      - name: Count Findings
        id: count
        run: |
          if [ -s semgrep.json ]; then
            COUNT=$(jq '.results | length' semgrep.json)
          else
            COUNT=0
          fi
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      # 🔹 Fail check → triggers PR notification + blocks merge
      - name: Fail Check if Findings Exist
        run: |
          if [ "${{ steps.count.outputs.count }}" != "0" ]; then
            echo "❌ Semgrep findings detected! Failing the build."
            exit 1
          fi

      - name: Success Message
        if: success()
        run: echo "No Semgrep findings in PR commits ✅"
