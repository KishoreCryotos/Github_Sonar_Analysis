name: Gitleaks Scan
 
on:
  pull_request:
    branches:
      - master
      - develop
    types: [opened, synchronize, reopened]
 
permissions:
  contents: read
 
jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
 
    steps:
      # 🔹 Checkout full git history
      # Required for PR commit comparison
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
 
      # 🔹 Run Gitleaks only on PR commits
      - name: Run Gitleaks (PR commits only)
        run: |
          # Create markdown template
          cat << 'EOF' > template.tpl
          {{range .}}### 🚨 Secret Detected
          - **File:** {{.File}}
          - **Rule:** {{.RuleID}}
          - **Line:** {{.StartLine}}
          - **Commit:** {{.Commit}}
          - **Author:** {{.Author}}
 
          {{end}}
          EOF
 
          # Scan ONLY commits introduced in this PR
          docker run --rm -v $(pwd):/repo -w /repo zricethezav/gitleaks detect \
            --source=/repo \
            --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
            --report-format template \
            --report-template /repo/template.tpl \
            --report-path /repo/gitleaks.md \
            --exit-code 0
 
      # 🔹 Publish findings into GitHub Checks tab
      - name: Show Report in PR Summary
        run: |
          if [ -s gitleaks.md ]; then
            cat gitleaks.md >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No secrets detected in PR commits" >> $GITHUB_STEP_SUMMARY
          fi
 
      # 🔹 Count findings
      - name: Count Findings
        id: count
        run: |
          if [ -s gitleaks.md ]; then
            COUNT=$(grep -c "🚨 Secret Detected" gitleaks.md || true)
          else
            COUNT=0
          fi
 
          echo "count=$COUNT" >> $GITHUB_OUTPUT
 
      # 🔹 Fail workflow if secrets detected
      # This creates failed PR check status
      - name: Fail Check if Findings Exist
        run: |
          if [ "${{ steps.count.outputs.count }}" != "0" ]; then
            echo "❌ Secrets detected! Failing the build."
            exit 1
          fi
 
      # 🔹 Success message
      - name: Success Message
        if: success()
        run: echo "✅ No secrets detected in PR commits"
 
