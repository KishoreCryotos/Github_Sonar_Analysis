name: Gitleaks Scan

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: write
  security-events: write   # 🔥 required for SARIF upload

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🔹 Generate markdown report (your format)
      - name: Run Gitleaks (Markdown + SARIF)
        run: |
          cat << 'EOF' > template.tpl
          {{range .}}### 🚨 Secret Detected
          - **File:** {{.File}}
          - **Rule:** {{.RuleID}}
          - **Line:** {{.StartLine}}
          - **Commit:** {{.Commit}}
          - **Author:** {{.Author}}

          {{end}}
          EOF

          # 🔥 Markdown report (for Checks summary)
          docker run --rm -v $(pwd):/repo -w /repo zricethezav/gitleaks detect \
            --source=/repo \
            --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
            --report-format template \
            --report-template /repo/template.tpl \
            --report-path /repo/gitleaks.md \
            --exit-code 0

          # 🔥 SARIF report (for GitHub native alerts)
          docker run --rm -v $(pwd):/repo -w /repo zricethezav/gitleaks detect \
            --source=/repo \
            --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
            --report-format sarif \
            --report-path /repo/gitleaks.sarif \
            --exit-code 0

      # 🔹 Upload SARIF → enables PR annotations + GitHub notifications
      - name: Upload Gitleaks SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif

      # 🔹 Show markdown in Checks tab
      - name: Show Report in PR Summary
        run: |
          if [ -s gitleaks.md ]; then
            cat gitleaks.md >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No secrets detected in PR commits" >> $GITHUB_STEP_SUMMARY
          fi

      # 🔹 Count findings
      - name: Count Findings
        id: count
        run: |
          if [ -s gitleaks.md ]; then
            COUNT=$(grep -c "🚨 Secret Detected" gitleaks.md || true)
          else
            COUNT=0
          fi
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      # 🔹 Create Issue (clean format, no email)
      - name: Create Issue
        if: steps.count.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const actor = context.actor;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "🚨 Gitleaks Alert - Secrets Detected",
              body:
                "🚨 Secrets detected in PR commits\n\n" +
                "Author: @" + actor + "\n" +
                "Branch: " + context.payload.pull_request.head.ref + "\n\n" +

                "🔍 View details:\n" +
                context.payload.pull_request.html_url + "\n\n" +

                "📌 Action Required:\n" +
                "- Open PR → Checks tab\n" +
                "- Identify affected file/line\n" +
                "- Remove secret\n" +
                "- Rotate credentials if real\n" +
                "- Push updated commit\n\n" +

                "⚠️ Treat exposed credentials as compromised."
            });

      # 🔹 PR comment → replaces email notification
      - name: Comment on PR (Notify Developer)
        if: steps.count.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const actor = context.actor;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body:
                "🚨 @"+actor+" Secrets detected in this PR.\n\n" +
                "👉 Check **Checks tab → Gitleaks Scan** for details.\n\n" +
                "⚠️ Please fix before merging."
            });

      # 🔹 Fail check (for PR status)
      - name: Fail Check if Findings Exist
        run: |
          if [ "${{ steps.count.outputs.count }}" != "0" ]; then
            exit 1
          fi

      - name: Success Message
        if: success()
        run: echo "No secrets detected in PR commits ✅"
