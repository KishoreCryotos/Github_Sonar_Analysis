name: Gitleaks Scan

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  security-events: write   # required for SARIF upload

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🔹 Generate markdown + SARIF reports
      - name: Run Gitleaks (Markdown + SARIF)
        run: |
          cat << 'EOF' > template.tpl
          {{range .}}### 🚨 Secret Detected
          - **File:** {{.File}}
          - **Rule:** {{.RuleID}}
          - **Line:** {{.StartLine}}
          - **Commit:** {{.Commit}}
          - **Author:** {{.Author}}

          {{end}}
          EOF

          # Markdown report (for Checks summary)
          docker run --rm -v $(pwd):/repo -w /repo zricethezav/gitleaks detect \
            --source=/repo \
            --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
            --report-format template \
            --report-template /repo/template.tpl \
            --report-path /repo/gitleaks.md \
            --exit-code 0

          # SARIF report (for GitHub code scanning alerts)
          docker run --rm -v $(pwd):/repo -w /repo zricethezav/gitleaks detect \
            --source=/repo \
            --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
            --report-format sarif \
            --report-path /repo/gitleaks.sarif \
            --exit-code 0

      # 🔹 Upload SARIF → enables PR annotations + Security tab alerts
      - name: Upload Gitleaks SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif

      # 🔹 Show report in Checks tab
      - name: Show Report in PR Summary
        run: |
          if [ -s gitleaks.md ]; then
            cat gitleaks.md >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No secrets detected in PR commits" >> $GITHUB_STEP_SUMMARY
          fi

      # 🔹 Count findings
      - name: Count Findings
        id: count
        run: |
          if [ -s gitleaks.md ]; then
            COUNT=$(grep -c "🚨 Secret Detected" gitleaks.md || true)
          else
            COUNT=0
          fi
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      # 🔹 Fail check → triggers PR notification + can block merge
      - name: Fail Check if Findings Exist
        run: |
          if [ "${{ steps.count.outputs.count }}" != "0" ]; then
            echo "❌ Secrets detected! Failing the build."
            exit 1
          fi

      - name: Success Message
        if: success()
        run: echo "No secrets detected in PR commits ✅"
