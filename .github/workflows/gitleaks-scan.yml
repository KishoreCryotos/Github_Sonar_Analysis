name: Gitleaks Scan

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: write

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks (scan PR commits only)
        run: |
          cat << 'EOF' > template.tpl
          {{range .}}### 🚨 Secret Detected
          - **File:** {{.File}}
          - **Rule:** {{.RuleID}}
          - **Line:** {{.StartLine}}
          - **Commit:** {{.Commit}}
          - **Author:** {{.Author}}

          {{end}}
          EOF

          docker run --rm -v $(pwd):/repo -w /repo zricethezav/gitleaks detect \
            --source=/repo \
            --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
            --report-format template \
            --report-template /repo/template.tpl \
            --report-path /repo/gitleaks.md \
            --exit-code 0

      - name: Show Report in PR Summary
        run: |
          if [ -s gitleaks.md ]; then
            cat gitleaks.md >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No secrets detected in PR commits" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Count Findings
        id: count
        run: |
          if [ -s gitleaks.md ]; then
            COUNT=$(grep -c "🚨 Secret Detected" gitleaks.md || true)
          else
            COUNT=0
          fi
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Get Commit Author Email
        id: email
        run: |
          EMAIL=$(git log -1 --format='%ae' || echo "unknown")
          echo "email=$EMAIL" >> $GITHUB_OUTPUT

      - name: Create Issue (Notify Developer)
        if: steps.count.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const actor = context.actor;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "🚨 Gitleaks Alert - Secrets Detected",
              body:
                "🚨 **Secrets detected in PR commits**\n\n" +
                "👤 Developer: @" + actor + "\n" +
                "📧 Email: " + "${{ steps.email.outputs.email }}" + "\n" +
                "🔹 Branch: " + context.payload.pull_request.head.ref + "\n" +
                "🔹 Base: " + context.payload.pull_request.base.ref + "\n\n" +

                "## 🔍 What was detected?\n" +
                "Check PR → Checks tab → Gitleaks Scan\n\n" +

                "## 📌 Action Required\n" +
                "1. Open PR → Checks tab\n" +
                "2. Remove secret from file\n" +
                "3. Rotate credentials if real\n" +
                "4. Push updated commit\n\n" +

                "⚠️ Treat exposed credentials as compromised."
            });

      - name: Send Email Notification
        if: steps.count.outputs.count != '0'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "🚨 Gitleaks Alert - Secrets Detected"
          to: ${{ steps.email.outputs.email }}
          from: DevSecOps Bot <${{ secrets.EMAIL_USER }}>
          body: |
            🚨 SECURITY ALERT

            Secrets detected in your PR.

            PR: ${{ github.event.pull_request.html_url }}

            Action Required:
            - Open PR Checks tab
            - Remove exposed secrets
            - Rotate credentials immediately
            - Push updated commit

      - name: Fail Check if Findings Exist
        run: |
          if [ "${{ steps.count.outputs.count }}" != "0" ]; then
            exit 1
          fi

      - name: Success Message
        if: success()
        run: echo "No secrets detected in PR commits ✅"
